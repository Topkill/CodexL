name: Dev Build Desktop App

on:
  push:
    branches:
      - main  # 每次你向 main 分支 push 代码时自动触发
  workflow_dispatch: # 支持手动点击按钮触发

permissions:
  contents: write

jobs:
  build-dev:
    name: Build Windows x64
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Package built-in plugins
        run: pnpm run package:builtin-plugins

      - name: Build Tauri App
        run: pnpm tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: "" # 绕过强制私钥签名

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CodexL-Windows-Installer
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe